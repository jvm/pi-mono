version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    groups:
      npm-development:
        dependency-type: development
      npm-production:
        dependency-type: production

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
