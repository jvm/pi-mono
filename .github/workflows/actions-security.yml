name: GitHub Actions Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "49 5 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    name: Audit workflows with zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Download zizmor prebuilt binary from GitHub Releases instead of using
      # the Docker-based action, which can fail transiently on ghcr.io pull
      # timeouts. This approach is faster and more reliable on Linux runners.
      # Uses the latest release (like the old Docker action's version: latest).
      - name: Install zizmor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo zizmorcore/zizmor \
            --pattern 'zizmor-x86_64-unknown-linux-gnu.tar.gz' \
            --output /tmp/zizmor.tar.gz
          tar xzf /tmp/zizmor.tar.gz -C /usr/local/bin zizmor
          chmod +x /usr/local/bin/zizmor

      - name: Verify zizmor version
        run: zizmor --version

      - name: Run zizmor
        run: |
          zizmor --color always \
                 --persona regular \
                 --min-severity low \
                 --min-confidence medium \
                 .
