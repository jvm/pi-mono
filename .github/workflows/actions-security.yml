name: GitHub Actions Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "49 5 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    name: Audit workflows with zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Download zizmor prebuilt binary from GitHub Releases instead of using
      # the Docker-based action, which can fail transiently on ghcr.io pull
      # timeouts. This approach is faster and more reliable on Linux runners.
      - name: Install zizmor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZIZMOR_VERSION="v1.25.2"
          gh release download "$ZIZMOR_VERSION" \
            --repo zizmorcore/zizmor \
            --pattern 'zizmor-x86_64-unknown-linux-gnu.tar.gz' \
            --output /tmp/zizmor.tar.gz
          tar xzf /tmp/zizmor.tar.gz -C /usr/local/bin zizmor
          chmod +x /usr/local/bin/zizmor

      - name: Run zizmor
        run: |
          zizmor --persona regular \
                 --min-severity low \
                 --min-confidence medium \
                 .
