name: Publish package to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: Package workspace name to publish
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: publish-${{ github.event.release.tag_name || inputs.package }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Resolve package from release tag or input
        id: package
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            package_name="${{ inputs.package }}"
            tag_version=""
          else
            tag_name="${{ github.event.release.tag_name }}"
            if [[ ! "$tag_name" =~ ^[a-z0-9][a-z0-9-]*@[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
              echo "Release tag must be '<package>@<version>', for example 'pi-web-kit@0.1.5'. Got: $tag_name" >&2
              exit 1
            fi
            package_name="${tag_name%@*}"
            tag_version="${tag_name##*@}"
          fi

          if [[ ! "$package_name" =~ ^[a-z0-9][a-z0-9-]*$ ]]; then
            echo "Invalid package name: $package_name" >&2
            exit 1
          fi

          package_dir="packages/$package_name"
          if [ ! -f "$package_dir/package.json" ]; then
            echo "Package directory not found: $package_dir" >&2
            exit 1
          fi

          package_json_name="$(node -p "require('./$package_dir/package.json').name")"
          if [ "$package_json_name" != "$package_name" ]; then
            echo "Package name mismatch: expected $package_name, got $package_json_name" >&2
            exit 1
          fi

          package_private="$(node -p "require('./$package_dir/package.json').private === true ? 'true' : 'false'")"
          if [ "$package_private" = "true" ]; then
            echo "Refusing to publish private package: $package_name" >&2
            exit 1
          fi

          version="$(node -p "require('./$package_dir/package.json').version")"
          if [ -z "$version" ]; then
            echo "Missing version in $package_dir/package.json" >&2
            exit 1
          fi
          if [ "${{ github.event_name }}" = "release" ] && [ "$tag_version" != "$version" ]; then
            echo "Release tag version must match package.json version: $package_name@$version" >&2
            exit 1
          fi

          echo "name=$package_name" >> "$GITHUB_OUTPUT"
          echo "dir=$package_dir" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check package
        run: npm run check --workspace ${{ steps.package.outputs.dir }}

      - name: Test package
        run: npm test --workspace ${{ steps.package.outputs.dir }} --if-present

      - name: Verify package contents
        run: npm run pack:dry-run --workspace ${{ steps.package.outputs.dir }}

      - name: Publish package
        run: npm publish --workspace ${{ steps.package.outputs.dir }} --provenance --access public
