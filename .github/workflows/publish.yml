name: Publish package to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: Package workspace name to publish
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: publish-${{ github.event.release.tag_name || inputs.package }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve package from release tag or input
        id: package
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PACKAGE: ${{ inputs.package }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            package_name="$INPUT_PACKAGE"
            tag_version=""
          else
            tag_name="$RELEASE_TAG_NAME"
            if [[ ! "$tag_name" =~ ^(@[a-z0-9][a-z0-9-]*/)?[a-z0-9][a-z0-9-]*@[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
              echo "Release tag must be '<package>@<version>', for example 'pi-web-kit@0.1.5' or '@scope/pkg@0.1.0'. Got: $tag_name" >&2
              exit 1
            fi
            package_name="${tag_name%@*}"
            tag_version="${tag_name##*@}"
          fi

          if [[ ! "$package_name" =~ ^(@[a-z0-9][a-z0-9-]*/)?[a-z0-9][a-z0-9-]*$ ]]; then
            echo "Invalid package name: $package_name" >&2
            exit 1
          fi

          package_slug="${package_name##*/}"
          package_dir="packages/$package_slug"
          if [ ! -f "$package_dir/package.json" ]; then
            echo "Package directory not found: $package_dir" >&2
            exit 1
          fi

          package_json_name="$(node -p "require('./$package_dir/package.json').name")"
          if [ "$package_json_name" != "$package_name" ]; then
            echo "Package name mismatch: expected $package_name, got $package_json_name" >&2
            exit 1
          fi

          package_private="$(node -p "require('./$package_dir/package.json').private === true ? 'true' : 'false'")"
          if [ "$package_private" = "true" ]; then
            echo "Refusing to publish private package: $package_name" >&2
            exit 1
          fi

          version="$(node -p "require('./$package_dir/package.json').version")"
          if [ -z "$version" ]; then
            echo "Missing version in $package_dir/package.json" >&2
            exit 1
          fi
          if [ "$EVENT_NAME" = "release" ] && [ "$tag_version" != "$version" ]; then
            echo "Release tag version must match package.json version: $package_name@$version" >&2
            exit 1
          fi

          {
            echo "name=$package_name"
            echo "dir=$package_dir"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Type check package
        env:
          PACKAGE_DIR: ${{ steps.package.outputs.dir }}
        run: npm run check --workspace "$PACKAGE_DIR"

      - name: Test package
        env:
          PACKAGE_DIR: ${{ steps.package.outputs.dir }}
        run: npm test --workspace "$PACKAGE_DIR" --if-present

      - name: Verify package contents
        env:
          PACKAGE_DIR: ${{ steps.package.outputs.dir }}
        run: npm run pack:dry-run --workspace "$PACKAGE_DIR"

      - name: Publish package
        env:
          PACKAGE_DIR: ${{ steps.package.outputs.dir }}
        run: npm publish --workspace "$PACKAGE_DIR" --provenance --access public
